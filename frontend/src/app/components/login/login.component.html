<div class="auth-page">
  <div class="auth-container">
    <div class="auth-header">
      <span class="auth-logo">🏠</span>
      <h2>欢迎回来</h2>
      <p>登录您的账号继续探索</p>
    </div>

    <div *ngIf="error" class="error-message">{{ error }}</div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input 
          type="text" 
          formControlName="username" 
          class="form-input"
          [class.invalid]="f['username'].touched && f['username'].invalid"
          placeholder="请输入用户名">
        <div *ngIf="f['username'].touched && f['username'].invalid" class="form-error">
          用户名不能为空
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">密码</label>
        <input 
          type="password" 
          formControlName="password" 
          class="form-input"
          [class.invalid]="f['password'].touched && f['password'].invalid"
          placeholder="请输入密码">
        <div *ngIf="f['password'].touched && f['password'].invalid" class="form-error">
          密码不能为空
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="loading">
        <span *ngIf="!loading">登录</span>
        <span *ngIf="loading">登录中...</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>还没有账号？<a routerLink="/register">立即注册</a></p>
    </div>
  </div>
</div>
