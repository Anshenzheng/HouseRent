<div class="auth-page">
  <div class="auth-container">
    <div class="auth-header">
      <span class="auth-logo">🏠</span>
      <h2>创建账号</h2>
      <p>加入我们，开启您的租房之旅</p>
    </div>

    <div *ngIf="error" class="error-message">{{ error }}</div>
    <div *ngIf="success" class="success-message">{{ success }}</div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label class="form-label">用户名 *</label>
        <input 
          type="text" 
          formControlName="username" 
          class="form-input"
          [class.invalid]="f['username'].touched && f['username'].invalid"
          placeholder="请输入用户名 (3-20个字符)">
        <div *ngIf="f['username'].touched && f['username'].errors" class="form-error">
          <span *ngIf="f['username'].errors['required']">用户名不能为空</span>
          <span *ngIf="f['username'].errors['minlength']">用户名至少3个字符</span>
          <span *ngIf="f['username'].errors['maxlength']">用户名最多20个字符</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">密码 *</label>
        <input 
          type="password" 
          formControlName="password" 
          class="form-input"
          [class.invalid]="f['password'].touched && f['password'].invalid"
          placeholder="请输入密码 (6-20个字符)">
        <div *ngIf="f['password'].touched && f['password'].errors" class="form-error">
          <span *ngIf="f['password'].errors['required']">密码不能为空</span>
          <span *ngIf="f['password'].errors['minlength']">密码至少6个字符</span>
          <span *ngIf="f['password'].errors['maxlength']">密码最多20个字符</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">确认密码 *</label>
        <input 
          type="password" 
          formControlName="confirmPassword" 
          class="form-input"
          [class.invalid]="f['confirmPassword'].touched && (f['confirmPassword'].invalid || registerForm.errors?.['passwordMismatch'])"
          placeholder="请再次输入密码">
        <div *ngIf="f['confirmPassword'].touched" class="form-error">
          <span *ngIf="f['confirmPassword'].errors?.['required']">请确认密码</span>
          <span *ngIf="registerForm.errors?.['passwordMismatch']">两次输入的密码不一致</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">角色 *</label>
        <div class="role-selector">
          <label class="role-option" [class.selected]="f['role'].value === 'TENANT'">
            <input type="radio" formControlName="role" value="TENANT">
            <span class="role-icon">👤</span>
            <span class="role-name">租客</span>
          </label>
          <label class="role-option" [class.selected]="f['role'].value === 'LANDLORD'">
            <input type="radio" formControlName="role" value="LANDLORD">
            <span class="role-icon">🏡</span>
            <span class="role-name">房东</span>
          </label>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">姓名</label>
          <input 
            type="text" 
            formControlName="realName" 
            class="form-input"
            placeholder="选填">
        </div>
        <div class="form-group">
          <label class="form-label">手机号</label>
          <input 
            type="tel" 
            formControlName="phone" 
            class="form-input"
            [class.invalid]="f['phone'].touched && f['phone'].invalid"
            placeholder="选填">
          <div *ngIf="f['phone'].touched && f['phone'].invalid" class="form-error">
            手机号格式不正确
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input 
          type="email" 
          formControlName="email" 
          class="form-input"
          [class.invalid]="f['email'].touched && f['email'].invalid"
          placeholder="选填">
        <div *ngIf="f['email'].touched && f['email'].invalid" class="form-error">
          邮箱格式不正确
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full" [disabled]="loading">
        <span *ngIf="!loading">注册</span>
        <span *ngIf="loading">注册中...</span>
      </button>
    </form>

    <div class="auth-footer">
      <p>已有账号？<a routerLink="/login">立即登录</a></p>
    </div>
  </div>
</div>
